name: CI - Build, Lint & Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancela builds antigas se um novo push vier
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================================
  # Job 1 — Build, Lint, Type-check
  # ============================================================
  build:
    name: Build & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint
        continue-on-error: true  # Lint não bloqueia build inicialmente

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-key-for-build-only

  # ============================================================
  # Job 2 — Security Scan (sem custo, automático)
  # ============================================================
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Scan de dependências com vulnerabilidades conhecidas
      - name: Audit npm dependencies
        run: |
          npm audit --audit-level=high || echo "Vulnerabilidades encontradas — revisar manualmente"
        continue-on-error: true

      # Scan de secrets vazadas no código (chaves, tokens, senhas)
      - name: Scan for leaked secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

  # ============================================================
  # Job 3 — Comentário no PR com resultado
  # ============================================================
  summary:
    name: Summary
    runs-on: ubuntu-latest
    needs: [build, security]
    if: always()
    steps:
      - name: Summary
        run: |
          echo "## Resumo do CI" >> $GITHUB_STEP_SUMMARY
          echo "- Build: ${{ needs.build.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Security: ${{ needs.security.result }}" >> $GITHUB_STEP_SUMMARY
